<!DOCTYPE html>
<html>

<head>

<title>Student Study Task Planner</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="container">

<header>

<h1>Student Study Task Planner</h1>

<button id="themeToggle">Toggle Dark Mode</button>

</header>

<section class="card">

<h2>Add Academic Task</h2>

<form id="taskForm" class="form-grid">

<input type="text" id="title" placeholder="Task Title" required>

<input type="text" id="course" placeholder="Course Name" required>

<select id="taskType">
<option>Assignment</option>
<option>Exam</option>
<option>Quiz</option>
<option>Self Study</option>
</select>

<input type="date" id="deadline">

<input type="number" id="studyHours" placeholder="Study Hours">

<button type="submit" class="primary-btn">Add Task</button>

</form>

</section>

<section class="card">

<h2>Search Tasks</h2>

<input type="text" id="searchInput" placeholder="Search by title or course">

</section>

<section class="card">

<h2>Sort Tasks</h2>

<select id="sortOption">
<option value="none">No Sorting</option>
<option value="earliest">Earliest Deadline</option>
<option value="latest">Latest Deadline</option>
</select>

</section>

<section class="card">

<h2>Deadline Warnings</h2>

<div id="warnings"></div>

</section>

<section class="card">

<h2>Task Statistics</h2>

<div class="stats-grid">

<div class="stat-box">
<p>Total Tasks</p>
<h3 id="totalTasks">0</h3>
</div>

<div class="stat-box">
<p>Completed</p>
<h3 id="completedTasks">0</h3>
</div>

<div class="stat-box">
<p>High Priority</p>
<h3 id="highPriorityTasks">0</h3>
</div>

</div>

</section>

<section class="card">

<h2>Study Progress</h2>

<div id="progressContainer">
<div id="progressBar"></div>
</div>

<p id="progressText">0% Completed</p>

</section>

<section class="card">

<h2>Task Filters</h2>

<div class="filter-buttons">

<button onclick="setFilter('ALL')">All</button>
<button onclick="setFilter('HIGH')">High</button>
<button onclick="setFilter('MEDIUM')">Medium</button>
<button onclick="setFilter('LOW')">Low</button>
<button onclick="setFilter('COMPLETED')">Completed</button>

</div>

</section>

<section class="card">

<h2>Task Analytics</h2>

<canvas id="taskChart"></canvas>

</section>

<section class="card">

<h2>Task List</h2>

<ul id="taskList"></ul>

</section>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="app.js"></script>

</body>

</html>
