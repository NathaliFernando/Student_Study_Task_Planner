<!DOCTYPE html>
<html>

<head>
    <title>Student Study Task Planner</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>Student Study & Task Planner</h1>

<h2>Add Academic Task</h2>

<form id="taskForm">

<input type="text" id="title" placeholder="Task Title" required>

<input type="text" id="course" placeholder="Course Name" required>

<select id="taskType">
<option>Assignment</option>
<option>Exam</option>
<option>Quiz</option>
<option>Self Study</option>
</select>

<input type="date" id="deadline">

<input type="number" id="studyHours" placeholder="Estimated Study Hours">

<button type="submit">Add Task</button>

</form>

<h2>⚠ Deadline Warnings</h2>
<div id="warnings"></div>

<h2>Task Statistics</h2>

<div id="stats">
<p>Total Tasks: <span id="totalTasks">0</span></p>
<p>Completed Tasks: <span id="completedTasks">0</span></p>
<p>High Priority Tasks: <span id="highPriorityTasks">0</span></p>
</div>

<h2>Study Progress</h2>

<div id="progressContainer">

<div id="progressBar"></div>

</div>

<p id="progressText">0% Completed</p>

<h2>Task Filters</h2>

<button onclick="setFilter('ALL')">All Tasks</button>
<button onclick="setFilter('HIGH')">High Priority</button>
<button onclick="setFilter('MEDIUM')">Medium Priority</button>
<button onclick="setFilter('LOW')">Low Priority</button>
<button onclick="setFilter('COMPLETED')">Completed</button>

<h2>Task List</h2>

<ul id="taskList"></ul>

<script src="app.js"></script>

</body>
</html>
